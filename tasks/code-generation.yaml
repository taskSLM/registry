    notes: "71.3% HumanEval — top code performer at 4B scale with multimodal support."
  - ref: "models/qwen2-5-7b-instruct.yaml"
    notes: "Exceptional code generation across multiple languages at 7.6B."
  - ref: "models/smollm3-3b.yaml"
    notes: "Dual-mode reasoning ideal for code assistants, fully open for research."
  - ref: "models/qwen3-5-4b.yaml"
    notes: "Strong coding with thinking-mode toggle for complex algorithms."
recommended_datasets:
