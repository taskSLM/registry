task_id: "code-generation"
display_name: "Code Generation"
domain: "Software Engineering"
description: "The process of generating syntactically correct and semantically meaningful source code from natural language descriptions. Covers function completion, bug fixing, code translation between languages, and implementing algorithms from specifications."
input_format: "Natural language instruction or problem description, optionally with existing code context"
output_format: "Source code in the requested programming language"
metrics_tracked:
  - Pass@1
  - Pass@10
  - HumanEval Score
  - LiveCodeBench Score
recommended_models:
