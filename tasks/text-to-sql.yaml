task_id: "text-to-sql"
display_name: "Text-to-SQL Generation"
domain: "Structured Data & Databases"
description: "The process of translating natural language questions or instructions into valid, executable SQL queries based on a given database schema. Requires understanding of table relationships, column types, and SQL dialect nuances."
input_format: "Plain text question + SQL CREATE TABLE schema definitions"
output_format: "Executable SQL query string"
metrics_tracked:
  - Execution Accuracy
  - Exact String Match
recommended_models:
  - ref: "models/qwen2-5-7b-instruct.yaml"
    notes: "Strong code reasoning and schema understanding at 7.6B."
  - ref: "models/phi-4-mini-instruct.yaml"
    notes: "Excellent reasoning at 3.8B, good for simple-to-moderate queries."
  - ref: "models/qwen3-5-4b.yaml"
    notes: "Strong general-purpose model with long-context support for large schemas."
recommended_datasets:
  - ref: "datasets/sql-create-context.yaml"
    purpose: "fine-tuning"
  - ref: "datasets/spider.yaml"
    purpose: "evaluation"
related_tasks:
  - task_id: "code-generation"
    relationship: "related"
  - task_id: "instruction-following"
    relationship: "parent"
