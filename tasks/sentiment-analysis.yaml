task_id: sentiment-analysis
display_name: Sentiment Analysis
domain: Natural Language Processing
description: Classifying the sentiment or emotional tone of text — positive, negative, neutral, or fine-grained emotions.
  A bread-and-butter NLP task used in customer feedback analysis, social media monitoring, and brand intelligence. Well-suited
  to small, specialized models.
input_format: Text passage (review, tweet, comment)
output_format: Sentiment label with optional confidence score
metrics_tracked:
- Accuracy
- F1 Score
- Macro-F1
