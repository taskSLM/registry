    metric: "Execution Accuracy"
    score: 86.4
    dataset: "datasets/spider.yaml"
    notes: "Strong schema understanding from code training. Zero-shot Spider evaluation."
    submitted_by: "@anckursingh"
    verified: false

  - model: "models/phi-3-mini.yaml"
